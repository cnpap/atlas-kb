jenkins:
  systemMessage: "atlas-kb Jenkins controller managed by Configuration as Code."
  numExecutors: 2
  mode: NORMAL
  disableRememberMe: false
  remotingSecurity:
    enabled: true
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  crumbIssuer:
    standard:
      excludeClientIPFromCrumb: true

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "${JENKINS_GITHUB_CREDENTIALS_ID}"
              scope: GLOBAL
              username: "${JENKINS_GITHUB_USERNAME}"
              password: "${JENKINS_GITHUB_TOKEN}"
              description: "GitHub PAT for atlas-kb pipeline checkout."

unclassified:
  location:
    url: "${JENKINS_URL}"

jobs:
  - file: /var/jenkins_home/casc_configs/jobs/atlas-kb.groovy

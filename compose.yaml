name: ${COMPOSE_PROJECT_NAME:-atlas-kb-admin}

services:
  web:
    image: ${ATLAS_KB_ADMIN_IMAGE:?ATLAS_KB_ADMIN_IMAGE is required}
    pull_policy: never
    restart: unless-stopped
    env_file:
      - .env.deploy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - php
      - artisan
      - serve
      - --host=0.0.0.0
      - --port=8000
    ports:
      - "${ATLAS_KB_ADMIN_HOST_PORT:-8000}:8000"
    networks:
      atlas-app-network:
        aliases:
          - atlas-kb-admin-web

  worker:
    image: ${ATLAS_KB_ADMIN_IMAGE:?ATLAS_KB_ADMIN_IMAGE is required}
    pull_policy: never
    restart: unless-stopped
    env_file:
      - .env.deploy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - php
      - artisan
      - queue:work
      - --tries=1
      - --timeout=0
    depends_on:
      - web
    networks:
      atlas-app-network:
        aliases:
          - atlas-kb-admin-worker

networks:
  atlas-app-network:
    external: true
    name: ${ATLAS_KB_DOCKER_NETWORK:-atlas-app-network}
